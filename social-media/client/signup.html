<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectSpace — Sign Up</title>
    <meta name="description" content="Create your ConnectSpace account and start sharing moments." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">✦ ConnectSpace</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">Sign In</a>
        <a href="signup.html" class="nav-link active">Sign Up</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
</nav>

<main class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🚀</div>
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Join ConnectSpace today — it's free!</p>
        </div>

        <form id="signup-form" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="cooluser123" required minlength="3" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="Min 8 chars, 1 upper, 1 number, 1 symbol" required />
                    <button type="button" class="toggle-pw" data-target="password">👁</button>
                </div>
            </div>

            <div class="form-group">
                <label for="bio">Bio <span style="color:var(--muted);font-weight:400">(optional)</span></label>
                <textarea id="bio" placeholder="Tell the world about yourself..." rows="2"
                    style="resize:none"></textarea>
            </div>

            <div id="signup-msg" class="form-msg hidden"></div>

            <button type="submit" class="btn-primary" id="signup-btn">
                <span class="btn-text">Create Account</span>
                <span class="spinner hidden"></span>
            </button>
        </form>

        <p class="auth-footer">Already have an account? <a href="index.html">Sign In</a></p>
    </div>
</main>

<script src="js/utils.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
