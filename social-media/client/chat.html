<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectSpace — Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .chat-layout { display: flex; height: calc(100vh - 60px); gap: 0; }
        .chat-sidebar { width: 300px; border-right: 1.5px solid var(--border); overflow-y: auto; background: var(--bg-secondary, #f8f9fa); }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 15px 20px; border-bottom: 1.5px solid var(--border); background: white; }
        .chat-header h3 { margin: 0; font-size: 1rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 12px; max-width: 70%; word-wrap: break-word; font-size: .95rem; }
        .message.sent { align-self: flex-end; background: var(--primary); color: white; margin: 5px 0; }
        .message.received { align-self: flex-start; background: #e9ecef; color: var(--text); margin: 5px 0; }
        .chat-input-wrap { padding: 15px; border-top: 1.5px solid var(--border); display: flex; gap: 10px; }
        .chat-input-wrap input { flex: 1; padding: 10px 15px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); font-family: inherit; }
        .chat-input-wrap button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .chat-user-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; transition: background 0.2s; }
        .chat-user-item:hover { background: #f0f0f0; }
        .chat-user-item.active { background: var(--primary); color: white; }
        .chat-user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-user-info { flex: 1; min-width: 0; }
        .chat-user-name { font-weight: 600; font-size: .95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); flex-direction: column; gap: 10px; }
        .chat-empty svg { width: 60px; height: 60px; opacity: 0.3; }
        .no-conversations { text-align: center; padding: 20px; color: var(--muted); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-brand">✦ ConnectSpace</div>
    <div class="nav-links">
        <a href="feed.html"    class="nav-link">🏠 Feed</a>
        <a href="profile.html" class="nav-link">👤 Profile</a>
        <a href="chat.html"    class="nav-link active">💬 Messages</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
        <button class="nav-icon-btn" id="logout-btn" title="Sign out">🚪</button>
    </div>
</nav>

<div class="chat-layout">
    <!-- USERS SIDEBAR -->
    <aside class="chat-sidebar">
        <div style="padding:15px;border-bottom:1.5px solid var(--border);font-weight:600">Conversations</div>
        <div id="users-list">
            <div class="no-conversations">Loading users...</div>
        </div>
    </aside>

    <!-- CHAT MAIN -->
    <div class="chat-main">
        <div id="chat-area" style="display:none;flex-direction:column;height:100%">
            <div class="chat-header">
                <div>
                    <h3 id="chat-title" style="margin:0">—</h3>
                    <small id="chat-subtitle" style="color:var(--muted)">Ready to chat</small>
                </div>
            </div>
            <div class="chat-messages" id="messages-list">
                <!-- Messages appear here -->
            </div>
            <div class="chat-input-wrap">
                <input type="text" id="message-input" placeholder="Type a message..." />
                <button id="send-btn" class="btn-primary" style="display:flex;align-items:center;justify-content:center;gap:8px">
                    <span class="btn-text">Send</span>
                    <span class="spinner hidden"></span>
                </button>
            </div>
        </div>
        <div id="chat-empty" class="chat-empty">
            <div style="font-size:3rem">💬</div>
            <div>Select a user to start a conversation</div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/chat.js"></script>

</body>
</html>
