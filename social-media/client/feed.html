<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectSpace — Feed</title>
    <meta name="description" content="Your ConnectSpace feed — see posts from people you follow." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-brand">✦ ConnectSpace</div>
    <div class="nav-links">
        <a href="feed.html"    class="nav-link active">🏠 Feed</a>
        <a href="profile.html" class="nav-link">👤 Profile</a>
        <a href="chat.html"    class="nav-link">💬 Messages</a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
        <button class="nav-icon-btn" id="logout-btn" title="Sign out">🚪</button>
    </div>
</nav>

<!-- LAYOUT -->
<div class="app-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-user">
            <img id="sb-avatar" class="sidebar-avatar" src="" alt="avatar" />
            <div class="sidebar-name" id="sb-name">—</div>
            <div class="sidebar-handle" id="sb-handle">@—</div>
        </div>
        <nav class="sidebar-nav">
            <a href="feed.html"    class="active"><span class="nav-emoji">🏠</span> Feed</a>
            <a href="profile.html"><span class="nav-emoji">👤</span> Profile</a>
            <a href="chat.html">  <span class="nav-emoji">💬</span> Messages</a>
        </nav>
    </aside>

    <!-- FEED -->
    <main class="feed-col">

        <!-- COMPOSER -->
        <div class="composer">
            <div class="composer-row">
                <img id="composer-avatar" class="composer-avatar" src="" alt="avatar" />
                <div class="composer-body">
                    <textarea id="post-caption" placeholder="What's on your mind?" rows="2"></textarea>
                    <div id="img-preview-wrap" class="hidden image-preview-wrap">
                        <img id="img-preview" class="image-preview" src="" alt="preview" />
                        <button class="image-preview-remove" id="remove-img-btn">✕</button>
                    </div>
                    <div class="composer-footer">
                        <div class="composer-actions">
                            <label class="composer-file-label">
                                🖼 Photo
                                <input type="file" id="post-image" accept="image/*" />
                            </label>
                        </div>
                        <button class="btn-primary" id="post-btn" style="width:auto;padding:8px 20px;font-size:.88rem">
                            <span class="btn-text">Post</span>
                            <span class="spinner hidden"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- POSTS -->
        <div id="posts-container">
            <!-- skeleton placeholders -->
            <div class="post-card" style="padding:18px;display:flex;flex-direction:column;gap:12px">
                <div style="display:flex;gap:10px;align-items:center">
                    <div class="skeleton" style="width:40px;height:40px;border-radius:50%"></div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
                        <div class="skeleton" style="height:12px;width:35%"></div>
                        <div class="skeleton" style="height:10px;width:20%"></div>
                    </div>
                </div>
                <div class="skeleton" style="height:220px;border-radius:10px"></div>
                <div class="skeleton" style="height:12px;width:80%"></div>
                <div class="skeleton" style="height:12px;width:55%"></div>
            </div>
        </div>

    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="right-sidebar">
        <div class="widget">
            <div class="widget-title">Suggested for you</div>
            <div id="suggestions-list">
                <div class="suggestion-item">
                    <div class="skeleton" style="width:38px;height:38px;border-radius:50%"></div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:5px">
                        <div class="skeleton" style="height:11px;width:60%"></div>
                        <div class="skeleton" style="height:9px;width:40%"></div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

</div>

<script src="js/utils.js"></script>
<script src="js/feed.js"></script>
</body>
</html>
